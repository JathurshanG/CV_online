name: Build CV PDF

on:
  push:
    branches:
      - main
    paths:
      - "cv.md"
      - "style.css"
      - ".github/workflows/build-cv.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc weasyprint

      - name: Generate PDF
        run: |
          mkdir -p output
          pandoc cv.md \
            -o output/CV_Jathurshan_Gnanaseelan_Benedict.pdf \
            --css=style.css \
            --pdf-engine=weasyprint \
            --metadata title="CV Jathurshan Gnanaseelan Benedict"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: output/CV_Jathurshan_Gnanaseelan_Benedict.pdf

      - name: Commit generated PDF
        run: |
          cp output/CV_Jathurshan_Gnanaseelan_Benedict.pdf ./CV_Jathurshan_Gnanaseelan_Benedict.pdf
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add CV_Jathurshan_Gnanaseelan_Benedict.pdf
          git commit -m "Generate CV PDF" || echo "No changes to commit"
          git push