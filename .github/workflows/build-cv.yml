```yaml id="61s0gc"
name: Build CV PDF

on:
  push:
    branches:
      - main
    paths:
      - "cv.md"
      - "style.css"
      - ".github/workflows/build-cv.yml"

  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc weasyprint

      - name: Generate PDF
        run: |
          mkdir -p output

          pandoc cv.md \
            -o output/CV_Jathurshan_Gnanaseelan_Benedict.pdf \
            --css=style.css \
            --pdf-engine=weasyprint \
            --metadata title="CV Jathurshan Gnanaseelan Benedict"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV_PDF
          path: output/CV_Jathurshan_Gnanaseelan_Benedict.pdf
```
