name: Build CV PDF

on:
  push:
    branches:
      - master
    paths:
      - "cv.md"
      - "style.css"
      - ".github/workflows/build-cv.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc weasyprint

      - name: Generate metadata
        run: |
          echo "LAST_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Generate PDF
        run: |
          mkdir -p output

          pandoc cv.md \
            -o output/CV_Jathurshan_Gnanaseelan_Benedict.pdf \
            --css=style.css \
            --pdf-engine=weasyprint \
            --metadata title="CV Jathurshan Gnanaseelan Benedict" \
            --metadata last_commit="$LAST_COMMIT" \
            --metadata build_date="$BUILD_DATE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV_PDF
          path: output/CV_Jathurshan_Gnanaseelan_Benedict.pdf

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest CV
          body: |
            Automatically generated CV PDF.

            Commit: ${{ env.LAST_COMMIT }}
            Build date: ${{ env.BUILD_DATE }}
          files: output/CV_Jathurshan_Gnanaseelan_Benedict.pdf
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}